map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s;

    # Static assets with cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Allow large uploads (images, etc.)
    client_max_body_size 20m;

    # Apple Universal Links association for iOS native OAuth callbacks.
    location = /.well-known/apple-app-site-association {
        set $backend http://crate-api:8585;
        proxy_pass $backend/api/auth/apple-app-site-association;
        proxy_set_header Host $host;
        default_type application/json;
    }

    location = /apple-app-site-association {
        set $backend http://crate-api:8585;
        proxy_pass $backend/api/auth/apple-app-site-association;
        proxy_set_header Host $host;
        default_type application/json;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript image/svg+xml;

    # Proxy API requests to backend (variable upstream for DNS re-resolution)
    location /api/ {
        set $backend http://crate-api:8585;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE/WebSocket support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
