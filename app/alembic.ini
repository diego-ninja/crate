# Alembic configuration for Crate.
#
# The DSN is NOT stored here — env.py reads it from the same env vars
# that core.py uses (CRATE_POSTGRES_*). This file only wires Alembic
# to the migrations directory and sets basic defaults.

[alembic]
script_location = crate/db/migrations
prepend_sys_path = .
path_separator = os

# Don't set sqlalchemy.url here — env.py builds it from env vars.
# sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
