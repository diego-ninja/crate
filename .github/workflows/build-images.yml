name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docker-compose.yaml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      images:
        description: "Images to build (comma-separated: backend,ui,listen or all)"
        default: "all"

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      listen: ${{ steps.filter.outputs.listen }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            backend:
              - 'app/crate/**'
              - 'app/requirements.txt'
              - 'app/Dockerfile'
              - 'app/bin/**'
              - 'app/scripts/**'
              - 'app/config.yaml'
            ui:
              - 'app/ui/**'
              - 'app/shared/**'
            listen:
              - 'app/listen/**'
              - 'app/shared/**'

  build-backend:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.images, 'backend') || github.event.inputs.images == 'all') ||
      github.event_name == 'push' && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/crate-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ui:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.images, 'ui') || github.event.inputs.images == 'all') ||
      github.event_name == 'push' && needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/crate-ui
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-listen:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.images, 'listen') || github.event.inputs.images == 'all') ||
      github.event_name == 'push' && needs.changes.outputs.listen == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/crate-listen
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/listen/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
