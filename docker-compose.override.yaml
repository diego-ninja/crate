# Override para entorno LOCAL
# Docker Compose carga este fichero automaticamente junto con docker-compose.yaml
# Para produccion, usar: docker compose -f docker-compose.yaml (sin override)

services:
  traefik:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik/local/traefik.yml:/traefik.yml:ro
      - ./data/traefik/local/certs:/certs:ro
    environment:
      - TZ=${TZ}
    labels:
      traefik.http.routers.traefik-secure.rule: Host(`traefik.musicdock.local`)

  authelia:
    labels:
      traefik.http.routers.authelia.rule: Host(`auth.musicdock.local`)

  lidarr:
    labels:
      traefik.http.routers.lidarr.rule: Host(`collection.musicdock.local`)

  navidrome:
    labels:
      traefik.http.routers.navidrome.rule: Host(`play.musicdock.local`)
      traefik.http.routers.navidrome-secure.rule: Host(`play.musicdock.local`)
      traefik.http.routers.navidrome-subsonic.rule: Host(`api.musicdock.local`) && PathPrefix(`/rest/`)

  tidarr:
    labels:
      traefik.http.routers.tidarr.rule: Host(`search.musicdock.local`)

  musicdock-api:
    ports:
      - "${MUSICDOCK_API_PORT}:8585"

  musicdock-ui:
    ports:
      - "${MUSICDOCK_UI_PORT:-8580}:80"
    labels:
      traefik.http.routers.admin.rule: Host(`admin.musicdock.local`)

  audiomuse:
    labels:
      traefik.http.routers.audiomuse.rule: Host(`ai.musicdock.local`)

  nginx:
    labels:
      traefik.http.routers.diego-ninja.rule: Host(`web.musicdock.local`)
