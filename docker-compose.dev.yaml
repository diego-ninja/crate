# Local development stack
# Usage: docker compose -f docker-compose.dev.yaml up -d
# UI: http://localhost:8580
# API: http://localhost:8585

networks:
  crate-dev:

services:
  postgres:
    image: postgres:15-alpine
    container_name: crate-dev-postgres
    environment:
      - POSTGRES_USER=crate
      - POSTGRES_PASSWORD=crate
      - POSTGRES_DB=crate
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - crate-dev

  redis:
    image: redis:7-alpine
    container_name: crate-dev-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-lru
    ports:
      - "6380:6379"
    networks:
      - crate-dev

  slskd:
    image: slskd/slskd:latest
    container_name: crate-dev-slskd
    entrypoint: ["/bin/sh", "-c", "mkdir -p /downloads/complete /downloads/incomplete && exec /usr/bin/tini -- ./start.sh"]
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_NO_AUTH=true
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME:-}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD:-}
      - SLSKD_SHARED_DIR=/music
      - SLSKD_DOWNLOADS_DIR=/downloads/complete
      - SLSKD_INCOMPLETE_DIR=/downloads/incomplete
    volumes:
      - ./test-music:/music:ro
      - dev_slskd:/app
      - dev_slskd_downloads:/downloads
    ports:
      - "5030:5030"
    networks:
      - crate-dev

  api:
    build: ./app
    container_name: crate-dev-api
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - REDIS_URL=redis://redis:6379/0
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music:ro
      - dev_data:/data
    ports:
      - "8585:8585"
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
      - slskd
    command: ["api"]

  worker:
    build: ./app
    container_name: crate-dev-worker
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - REDIS_URL=redis://redis:6379/0
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      # SCRAPE_PROXY_URL not set in dev — VPN image is x86_64 only, scrapes go direct
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music
      - dev_slskd_downloads:/downloads/soulseek
      - dev_data:/data
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
      - slskd
    command: ["worker"]

  caddy:
    image: caddy:2-alpine
    container_name: crate-dev-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - dev_caddy_data:/data
      - dev_caddy_config:/config
    networks:
      - crate-dev
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dev_postgres:
  dev_data:
  dev_slskd:
  dev_slskd_downloads:
  dev_caddy_data:
  dev_caddy_config:
