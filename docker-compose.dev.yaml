# Local development stack
# Usage: docker compose -f docker-compose.dev.yaml up -d
# UI: http://localhost:8580
# API: http://localhost:8585

networks:
  musicdock-dev:

services:
  postgres:
    image: postgres:15-alpine
    container_name: musicdock-dev-postgres
    environment:
      - POSTGRES_USER=musicdock
      - POSTGRES_PASSWORD=musicdock
      - POSTGRES_DB=musicdock
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - musicdock-dev

  redis:
    image: redis:7-alpine
    container_name: musicdock-dev-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    networks:
      - musicdock-dev

  slskd:
    image: slskd/slskd:latest
    container_name: musicdock-dev-slskd
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_NO_AUTH=true
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME:-}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD:-}
      - SLSKD_SHARED_DIR=/music
    volumes:
      - ./test-music:/music:ro
      - dev_slskd:/app
    ports:
      - "5030:5030"
    networks:
      - musicdock-dev

  api:
    build: ./app
    container_name: musicdock-dev-api
    environment:
      - TZ=Europe/Madrid
      - MUSICDOCK_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - MUSICDOCK_POSTGRES_USER=musicdock
      - MUSICDOCK_POSTGRES_PASSWORD=musicdock
      - MUSICDOCK_POSTGRES_DB=musicdock
      - MUSICDOCK_POSTGRES_HOST=postgres
      - DOMAIN=localhost
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NAVIDROME_URL=
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - REDIS_URL=redis://redis:6379/0
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music:ro
      - dev_data:/data
    ports:
      - "8585:8585"
    networks:
      - musicdock-dev
    depends_on:
      - postgres
      - redis
      - slskd
    command: ["api"]

  worker:
    build: ./app
    container_name: musicdock-dev-worker
    environment:
      - TZ=Europe/Madrid
      - MUSICDOCK_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - MUSICDOCK_POSTGRES_USER=musicdock
      - MUSICDOCK_POSTGRES_PASSWORD=musicdock
      - MUSICDOCK_POSTGRES_DB=musicdock
      - MUSICDOCK_POSTGRES_HOST=postgres
      - DOMAIN=localhost
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NAVIDROME_URL=
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - REDIS_URL=redis://redis:6379/0
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music
      - dev_data:/data
    networks:
      - musicdock-dev
    depends_on:
      - postgres
      - redis
      - slskd
    command: ["worker"]

volumes:
  dev_postgres:
  dev_data:
  dev_slskd:
