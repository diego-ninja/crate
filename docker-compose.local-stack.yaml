# Local-only override
# Docker Compose loads this file alongside docker-compose.yaml.
# For production use: docker compose -f docker-compose.yaml

services:
  traefik:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik/local/traefik.yml:/traefik.yml:ro
      - ./data/traefik/local/certs:/certs:ro
    environment:
      - TZ=${TZ}
    labels:
      traefik.http.routers.traefik-secure.rule: Host(`traefik.crate.local`)

  tidarr:
    labels:
      traefik.http.routers.tidarr.rule: Host(`search.crate.local`)

  crate-api:
    ports:
      - "${CRATE_API_PORT:-8585}:8585"

  crate-ui:
    ports:
      - "${CRATE_UI_PORT:-8580}:80"
    labels:
      traefik.http.routers.admin.rule: Host(`admin.crate.local`)

  nginx:
    labels:
      traefik.http.routers.diego-ninja.rule: Host(`web.crate.local`)
