<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicDock Librarian</title>
  <style>
    :root {
      --bg: #0a0a0a; --bg-card: #141414; --bg-hover: #1e1e1e; --bg-input: #1a1a1a;
      --border: #262626; --text: #e5e5e5; --text-dim: #737373; --text-bright: #fafafa;
      --accent: #7c3aed; --accent-dim: #5b21b6; --accent-glow: rgba(124,58,237,0.15);
      --green: #22c55e; --red: #ef4444; --yellow: #eab308; --orange: #f97316; --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout */
    .shell { display: flex; min-height: 100vh; }
    nav { width: 220px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 1.5rem 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
    main { flex: 1; margin-left: 220px; padding: 2rem; max-width: 1100px; }

    /* Nav */
    .nav-brand { padding: 0 1.25rem 1.5rem; font-size: 1.1rem; font-weight: 700; color: var(--text-bright); border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .nav-brand span { color: var(--accent); }
    .nav-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1.25rem; color: var(--text-dim); font-size: 0.875rem; cursor: pointer; transition: all 0.1s; }
    .nav-link:hover { color: var(--text); background: var(--bg-hover); text-decoration: none; }
    .nav-link.active { color: var(--accent); background: var(--accent-glow); border-right: 2px solid var(--accent); }
    .nav-section { padding: 0.5rem 1.25rem 0.25rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-top: 0.5rem; }

    /* Search bar */
    .search-bar { position: relative; margin-bottom: 2rem; }
    .search-bar input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; outline: none; }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar::before { content: "⌕"; position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1.1rem; }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; max-height: 400px; overflow-y: auto; z-index: 100; display: none; }
    .search-results.show { display: block; }
    .search-result { padding: 0.6rem 1rem; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    .search-result:hover { background: var(--bg-hover); }
    .search-result .dim { color: var(--text-dim); font-size: 0.75rem; }

    /* Stats */
    .stats-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; flex: 1; min-width: 120px; }
    .stat .val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em; }

    /* Cards & Grid */
    .grid { display: grid; gap: 1rem; }
    .grid-artists { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .grid-albums { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; transition: all 0.15s; cursor: pointer; }
    .card:hover { border-color: var(--accent); background: var(--bg-hover); }
    .card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .card-sub { font-size: 0.75rem; color: var(--text-dim); }

    /* Album card with cover */
    .album-card { text-align: center; padding: 0.75rem; }
    .album-cover { width: 100%; aspect-ratio: 1; border-radius: 6px; background: var(--bg-hover); margin-bottom: 0.5rem; object-fit: cover; display: block; }
    .album-cover-placeholder { width: 100%; aspect-ratio: 1; border-radius: 6px; background: var(--bg-hover); margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-dim); }

    /* Album detail */
    .album-header { display: flex; gap: 2rem; margin-bottom: 2rem; align-items: flex-start; }
    .album-header .cover { width: 200px; height: 200px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg-hover); }
    .album-info h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .album-info h2 { font-size: 1rem; font-weight: 400; color: var(--text-dim); margin-bottom: 1rem; }
    .album-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .album-meta .tag { background: var(--bg-hover); padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; color: var(--text-dim); }

    /* Track table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    tr:hover td { background: var(--bg-hover); }
    td.dim { color: var(--text-dim); }
    td.mono { font-family: 'SF Mono', monospace; font-size: 0.8rem; }

    /* Tag editor */
    .tag-editor { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .tag-field { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; }
    .tag-field label { width: 100px; font-size: 0.8rem; color: var(--text-dim); text-align: right; flex-shrink: 0; }
    .tag-field input { flex: 1; padding: 0.4rem 0.6rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; outline: none; }
    .tag-field input:focus { border-color: var(--accent); }
    .tag-field input.changed { border-color: var(--yellow); background: rgba(234,179,8,0.05); }

    /* Buttons */
    .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.85rem; transition: all 0.1s; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-success { border-color: var(--green); color: var(--green); }
    .btn-success:hover { background: var(--green); color: white; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
    .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* Match candidates */
    .match-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .match-card:hover { border-color: var(--accent); }
    .match-score { font-size: 1.5rem; font-weight: 700; width: 50px; text-align: center; flex-shrink: 0; }
    .match-score.high { color: var(--green); }
    .match-score.mid { color: var(--yellow); }
    .match-score.low { color: var(--red); }
    .match-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .match-info { flex: 1; }
    .match-info h3 { font-size: 0.95rem; margin-bottom: 0.15rem; }
    .match-info .sub { font-size: 0.8rem; color: var(--text-dim); }

    /* Preview table (tag diff) */
    .diff-old { color: var(--red); text-decoration: line-through; font-size: 0.8rem; }
    .diff-new { color: var(--green); font-size: 0.8rem; }

    /* Duplicate resolver */
    .dup-side { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .dup-side.selected { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
    .dup-compare { display: flex; gap: 1rem; }

    /* Badges */
    .badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
    .badge-crit { background: var(--red); color: white; }
    .badge-high { background: var(--orange); color: white; }
    .badge-med { background: var(--yellow); color: #000; }
    .badge-low { background: var(--border); color: var(--text-dim); }
    .badge-format { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

    /* Misc */
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
    .empty { text-align: center; padding: 3rem; color: var(--text-dim); }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; align-items: center; gap: 0.75rem; padding: 2rem; justify-content: center; color: var(--text-dim); }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg-card); border: 1px solid var(--green); border-radius: 8px; padding: 0.75rem 1.25rem; font-size: 0.85rem; z-index: 200; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    .breadcrumb { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 1rem; }
    .breadcrumb a { color: var(--text-dim); }
    .breadcrumb a:hover { color: var(--accent); }
    .format-label { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px; font-weight: 600; }
    .format-flac { background: rgba(34,197,94,0.15); color: var(--green); }
    .format-mp3 { background: rgba(59,130,246,0.15); color: var(--blue); }
    .format-m4a { background: rgba(249,115,22,0.15); color: var(--orange); }
    /* Bar chart */
    .bar-chart { display: flex; flex-direction: column; gap: 0.35rem; }
    .bar-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
    .bar-label { width: 120px; text-align: right; color: var(--text-dim); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: var(--bg-hover); border-radius: 3px; height: 20px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; min-width: 2px; }
    .bar-val { width: 50px; font-size: 0.75rem; color: var(--text-dim); }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 800px) { .chart-grid { grid-template-columns: 1fr; } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="shell">
    <nav>
      <div class="nav-brand"><span>♫</span> Librarian</div>
      <a class="nav-link active" href="/" data-page="dashboard">◉ Dashboard</a>
      <a class="nav-link" href="/browse" data-page="browse">▤ Browse</a>
      <div class="nav-section">Tools</div>
      <a class="nav-link" href="/health" data-page="health">⚕ Health Scan</a>
      <a class="nav-link" href="/duplicates" data-page="duplicates">◫ Duplicates</a>
      <a class="nav-link" href="/artwork" data-page="artwork">⬒ Album Art</a>
      <a class="nav-link" href="/organizer" data-page="organizer">⇄ Organizer</a>
      <a class="nav-link" href="/imports" data-page="imports">↓ Imports</a>
      <div class="nav-section">Insights</div>
      <a class="nav-link" href="/analytics" data-page="analytics">◔ Analytics</a>
      <a class="nav-link" href="/missing-albums" data-page="missing-albums">◌ Missing Albums</a>
      <a class="nav-link" href="/quality" data-page="quality">◈ Quality</a>
    </nav>

    <main>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search artists, albums..." autocomplete="off">
        <div class="search-results" id="search-results"></div>
      </div>

      <div id="page-content"></div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
  // ═══════════════════════════════════════════════════════════════
  // ROUTER
  // ═══════════════════════════════════════════════════════════════
  const pages = {};
  let currentPath = location.pathname;

  function navigate(path, pushState = true) {
    currentPath = path;
    if (pushState) history.pushState(null, '', path);
    document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.getAttribute('href') === path || (path.startsWith('/artist') && l.dataset.page === 'browse') || (path.startsWith('/album') && l.dataset.page === 'browse')));
    renderPage(path);
  }

  window.addEventListener('popstate', () => navigate(location.pathname, false));

  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', e => { e.preventDefault(); navigate(link.getAttribute('href')); });
  });

  async function renderPage(path) {
    const el = document.getElementById('page-content');
    el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';

    if (path === '/') await renderDashboard(el);
    else if (path === '/browse') await renderBrowse(el);
    else if (path.startsWith('/artist/')) await renderArtist(el, decodeURIComponent(path.slice(8)));
    else if (path.startsWith('/album/')) {
      const parts = path.slice(7).split('/');
      const artist = decodeURIComponent(parts[0]);
      const album = decodeURIComponent(parts.slice(1).join('/'));
      await renderAlbum(el, artist, album);
    }
    else if (path === '/health') await renderHealth(el);
    else if (path === '/duplicates') await renderDuplicates(el);
    else if (path === '/artwork') await renderArtwork(el);
    else if (path === '/organizer') await renderOrganizer(el);
    else if (path === '/imports') await renderImports(el);
    else if (path === '/analytics') await renderAnalytics(el);
    else if (path === '/missing-albums') await renderMissingAlbums(el);
    else if (path === '/quality') await renderQuality(el);
    else el.innerHTML = '<div class="empty">Page not found</div>';
  }

  // ═══════════════════════════════════════════════════════════════
  // DASHBOARD
  // ═══════════════════════════════════════════════════════════════
  async function renderDashboard(el) {
    const stats = await api('/api/stats');
    const status = await api('/api/status');
    el.innerHTML = `
      <div class="section">
        <div class="stats-row">
          <div class="stat"><div class="val">${fmt(stats.artists)}</div><div class="lbl">Artists</div></div>
          <div class="stat"><div class="val">${fmt(stats.albums)}</div><div class="lbl">Albums</div></div>
          <div class="stat"><div class="val">${fmt(stats.tracks)}</div><div class="lbl">Tracks</div></div>
          <div class="stat"><div class="val">${stats.total_size_gb} GB</div><div class="lbl">Total Size</div></div>
          <div class="stat"><div class="val">${status.issue_count}</div><div class="lbl">Issues</div></div>
        </div>
        <div class="stats-row">
          ${Object.entries(stats.formats || {}).map(([k,v]) => `<div class="stat"><div class="val">${fmt(v)}</div><div class="lbl">${k.replace('.','').toUpperCase()}</div></div>`).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-title">Quick Actions</div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="navigate('/browse')">Browse Library</button>
          <button class="btn" onclick="navigate('/health')">Health Scan</button>
          <button class="btn" onclick="navigate('/duplicates')">Find Duplicates</button>
          <button class="btn" onclick="navigate('/artwork')">Album Art</button>
          <button class="btn" onclick="navigate('/imports')">Import Queue</button>
        </div>
      </div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // BROWSE
  // ═══════════════════════════════════════════════════════════════
  async function renderBrowse(el) {
    const artists = await api('/api/artists');
    el.innerHTML = `
      <div class="section">
        <div class="section-title">Artists (${artists.length})</div>
        <div class="grid grid-artists">
          ${artists.map(a => `
            <div class="card" onclick="navigate('/artist/${enc(a.name)}')">
              <div class="card-title">${esc(a.name)}</div>
              <div class="card-sub">${a.albums} album${a.albums !== 1 ? 's' : ''}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // ARTIST
  // ═══════════════════════════════════════════════════════════════
  async function renderArtist(el, name) {
    const data = await api(`/api/artist/${enc(name)}`);
    if (data.error) { el.innerHTML = `<div class="empty">${data.error}</div>`; return; }
    el.innerHTML = `
      <div class="breadcrumb"><a href="/browse" onclick="event.preventDefault();navigate('/browse')">Browse</a> / ${esc(name)}</div>
      <h1 style="margin-bottom:1.5rem">${esc(name)}</h1>
      <div class="grid grid-albums">
        ${data.albums.map(a => `
          <div class="album-card card" onclick="navigate('/album/${enc(name)}/${enc(a.name)}')">
            <img class="album-cover" src="/api/cover/${enc(name)}/${enc(a.name)}" onerror="this.outerHTML='<div class=album-cover-placeholder>♫</div>'" loading="lazy">
            <div class="card-title" style="text-align:left">${esc(a.name)}</div>
            <div class="card-sub" style="text-align:left">${a.year || '?'} · ${a.tracks}t · ${a.formats.map(f => `<span class="format-label format-${f.replace('.','')}">${f.replace('.','').toUpperCase()}</span>`).join(' ')}</div>
          </div>
        `).join('')}
      </div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // ALBUM DETAIL + TAG EDITOR + MB MATCHER
  // ═══════════════════════════════════════════════════════════════
  let _albumData = null;

  async function renderAlbum(el, artist, album) {
    const data = await api(`/api/album/${enc(artist)}/${enc(album)}`);
    if (data.error) { el.innerHTML = `<div class="empty">${data.error}</div>`; return; }
    _albumData = data;
    const t = data.album_tags || {};
    const mins = Math.floor(data.total_length_sec / 60);

    el.innerHTML = `
      <div class="breadcrumb">
        <a href="/browse" onclick="event.preventDefault();navigate('/browse')">Browse</a> /
        <a href="/artist/${enc(artist)}" onclick="event.preventDefault();navigate('/artist/${enc(artist)}')">${esc(artist)}</a> /
        ${esc(album)}
      </div>

      <div class="album-header">
        <img class="cover" src="/api/cover/${enc(artist)}/${enc(album)}" onerror="this.style.display='none'" loading="lazy">
        <div class="album-info">
          <h1>${esc(t.album || album)}</h1>
          <h2>${esc(t.artist || artist)}</h2>
          <div class="album-meta">
            ${t.year ? `<span class="tag">${t.year}</span>` : ''}
            <span class="tag">${data.track_count} tracks</span>
            <span class="tag">${mins} min</span>
            <span class="tag">${data.total_size_mb} MB</span>
            ${data.has_cover ? '<span class="tag">Has cover</span>' : '<span class="tag" style="color:var(--red)">No cover</span>'}
            ${t.musicbrainz_albumid ? `<span class="tag">MB: ${t.musicbrainz_albumid.slice(0,8)}...</span>` : '<span class="tag" style="color:var(--yellow)">No MBID</span>'}
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" onclick="toggleTagEditor()">Edit Tags</button>
            <button class="btn btn-success" id="btn-match" onclick="matchMusicBrainz('${esc(artist)}','${esc(album)}')">Sync from MusicBrainz</button>
          </div>
        </div>
      </div>

      <!-- Tag Editor (hidden) -->
      <div id="tag-editor" class="tag-editor hidden">
        <div class="section-title">Album Tags <button class="btn btn-sm btn-primary" onclick="saveTags('${esc(artist)}','${esc(album)}')">Save Tags</button></div>
        <div class="tag-field"><label>Artist</label><input id="tag-artist" value="${esc(t.artist || '')}" data-orig="${esc(t.artist || '')}" oninput="markChanged(this)"></div>
        <div class="tag-field"><label>Album Artist</label><input id="tag-albumartist" value="${esc(t.artist || '')}" data-orig="${esc(t.artist || '')}" oninput="markChanged(this)"></div>
        <div class="tag-field"><label>Album</label><input id="tag-album" value="${esc(t.album || '')}" data-orig="${esc(t.album || '')}" oninput="markChanged(this)"></div>
        <div class="tag-field"><label>Year</label><input id="tag-date" value="${esc(t.year || '')}" data-orig="${esc(t.year || '')}" oninput="markChanged(this)"></div>
      </div>

      <!-- MB Match Results (hidden) -->
      <div id="match-results" class="section hidden"></div>

      <!-- Track listing -->
      <div class="section">
        <div class="section-title">Tracks</div>
        <table>
          <thead><tr><th>#</th><th>Title</th><th>Format</th><th>Bitrate</th><th>Duration</th><th>Size</th></tr></thead>
          <tbody>
            ${data.tracks.map((t,i) => `<tr>
              <td class="dim">${t.tags.tracknumber || (i+1)}</td>
              <td>${esc(t.tags.title || t.filename)}</td>
              <td><span class="format-label format-${t.format.replace('.','')}">${t.format.replace('.','').toUpperCase()}</span></td>
              <td class="dim mono">${t.bitrate ? t.bitrate+'k' : '-'}</td>
              <td class="dim mono">${fmtTime(t.length_sec)}</td>
              <td class="dim mono">${t.size_mb} MB</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function toggleTagEditor() {
    document.getElementById('tag-editor').classList.toggle('hidden');
  }

  function markChanged(input) {
    input.classList.toggle('changed', input.value !== input.dataset.orig);
  }

  async function saveTags(artist, album) {

      artist: document.getElementById('tag-artist').value,
      albumartist: document.getElementById('tag-albumartist').value,

      date: document.getElementById('tag-date').value,

  // ═══════════════════════════════════════════════════════════════
  // MUSICBRAINZ MATCHER
  // ═══════════════════════════════════════════════════════════════
  async function matchMusicBrainz(artist, album) {
    const btn = document.getElementById('btn-match');
    btn.innerHTML = '<div class="spinner"></div> Searching...';
    btn.disabled = true;

    const results = await api(`/api/match/${enc(artist)}/${enc(album)}`);
    btn.innerHTML = 'Sync from MusicBrainz';
    btn.disabled = false;

    const el = document.getElementById('match-results');
    el.classList.remove('hidden');

    if (!results.length) {
      el.innerHTML = '<div class="empty">No matches found on MusicBrainz</div>';
      return;
    }

    el.innerHTML = `
      <div class="section-title">MusicBrainz Matches</div>
      ${results.map((r, idx) => {
        const sc = r.match_score;
        const cls = sc >= 70 ? 'high' : sc >= 40 ? 'mid' : 'low';
        return `
          <div class="match-card">
            <div class="match-header">
              <div class="match-score ${cls}">${sc}</div>
              <div class="match-info">
                <h3>${esc(r.title)}</h3>
                <div class="sub">${esc(r.artist)} · ${r.date || '?'} · ${r.track_count} tracks ${r.country ? '· '+r.country : ''}</div>
              </div>
              <button class="btn btn-sm btn-success" onclick="applyMatch(${idx}, '${esc(artist)}', '${esc(album)}')">Apply</button>
            </div>
            ${r.tag_preview ? `
              <table>
                <thead><tr><th>#</th><th>Current</th><th>MusicBrainz</th><th>Δ sec</th></tr></thead>
                <tbody>${r.tag_preview.map(p => `<tr>
                  <td class="dim">${p.new_track || '?'}</td>
                  <td>${p.current_title !== p.new_title ? `<span class="diff-old">${esc(p.current_title)}</span>` : esc(p.current_title)}</td>
                  <td>${p.current_title !== p.new_title ? `<span class="diff-new">${esc(p.new_title)}</span>` : '<span class="dim">same</span>'}</td>
                  <td class="dim mono">${p.duration_diff !== null ? (p.duration_diff <= 2 ? '✓' : p.duration_diff+'s') : '-'}</td>
                </tr>`).join('')}</tbody>
              </table>` : ''}
          </div>`;
      }).join('')}`;

    window._matchResults = results;
  }

  async function applyMatch(idx, artist, album) {
    if (!confirm('Apply MusicBrainz tags? This will overwrite current tags.')) return;
    const release = window._matchResults[idx];
    const res = await api('/api/match/apply', 'POST', {
      artist_folder: artist, album_folder: album, release: release
    });
    toast(`Applied: ${res.updated}/${res.total} tracks updated`);
    // Refresh album view
    setTimeout(() => renderAlbum(document.getElementById('page-content'), artist, album), 500);
  }

  async function renderHealth(el) {
    const status = await api('/api/status');

        <div class="btn-group" style="margin-bottom:1.5rem">

          <button class="btn" onclick="runScan('duplicates')">Duplicates</button>

  async function runScan(only) {
    await api('/api/scan', 'POST', only ? { only } : {});
    document.getElementById('scan-status')?.classList.remove('hidden');
    pollScan();
  }

  async function pollScan() {
    const s = await api('/api/status');
    const el = document.getElementById('scan-progress');
    if (el) el.textContent = s.progress || 'Scanning...';
    if (s.scanning) { setTimeout(pollScan, 2000); return; }
    document.getElementById('scan-status')?.classList.add('hidden');
    loadIssues();
  }

  async function loadIssues() {
    const issues = await api('/api/issues');
    const el = document.getElementById('issues-container');
    if (!el) return;
    if (!issues.length) { el.innerHTML = '<div class="empty">No issues found</div>'; return; }

    const grouped = {};
    issues.forEach(i => { (grouped[i.type] = grouped[i.type] || []).push(i); });

    el.innerHTML = `
      <div style="margin-bottom:1rem;color:var(--text-dim)">${issues.length} issues found</div>
      ${Object.entries(grouped).map(([type, items]) => `
        <div class="section">
          <div class="section-title">${type.replace(/_/g,' ')} (${items.length})</div>
          ${items.map(i => `
            <div class="match-card" style="margin-bottom:0.5rem">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div>
                  <div style="font-size:0.9rem">${esc(i.description)}</div>
                  <div style="font-size:0.8rem;color:var(--green);margin-top:0.25rem">${esc(i.suggestion)}</div>
                </div>
                <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0">
                  <span class="badge badge-${i.severity === 'critical' ? 'crit' : i.severity === 'high' ? 'high' : i.severity === 'medium' ? 'med' : 'low'}">${i.severity}</span>
                  <span style="font-size:0.8rem;color:var(--text-dim)">${i.confidence}%</span>

              </div>
            </div>
          `).join('')}

  // DUPLICATES
  // ═══════════════════════════════════════════════════════════════
  async function renderDuplicates(el) {
    el.innerHTML = `
      <div class="section">
        <div class="section-title">Duplicate Resolver</div>
        <p style="color:var(--text-dim);margin-bottom:1rem">Run a duplicates scan first from Health, then resolve them here.</p>
        <button class="btn btn-primary" onclick="scanAndShowDuplicates()">Scan for Duplicates</button>
        <div id="dup-list" style="margin-top:1.5rem"></div>
      </div>`;
  }

  async function scanAndShowDuplicates() {
    await api('/api/scan', 'POST', { only: 'duplicates' });
    toast('Scanning for duplicates...');
    const poll = async () => {
      const s = await api('/api/status');
      if (s.scanning) { setTimeout(poll, 2000); return; }
      const issues = await api('/api/issues?type=duplicate_album');
      renderDuplicateList(issues);
    };
    setTimeout(poll, 2000);
  }

  function renderDuplicateList(issues) {
    const el = document.getElementById('dup-list');
    if (!issues.length) { el.innerHTML = '<div class="empty">No duplicates found</div>'; return; }

    el.innerHTML = issues.map((issue, idx) => {
      const paths = issue.paths.map(p => p.replace('/music/', ''));
      return `
        <div class="match-card">
          <div style="font-size:0.9rem;margin-bottom:0.5rem">${esc(issue.description)}</div>
          <div style="font-size:0.8rem;color:var(--green);margin-bottom:0.75rem">${esc(issue.suggestion)}</div>
          <div class="btn-group">
            <button class="btn btn-sm" onclick="compareDuplicates(${idx})">Compare</button>
            ${issue.details?.keep ? `<button class="btn btn-sm btn-success" onclick="autoResolve(${idx})">Auto-resolve</button>` : ''}
          </div>
          <div id="dup-compare-${idx}"></div>
        </div>`;
    }).join('');

    window._dupIssues = issues;
  }

  async function compareDuplicates(idx) {
    const issue = window._dupIssues[idx];
    const paths = issue.paths.map(p => p.replace('/music/', ''));
    const qs = paths.map(p => `path=${encodeURIComponent(p)}`).join('&');
    const albums = await api(`/api/duplicates/compare?${qs}`);

    const el = document.getElementById(`dup-compare-${idx}`);
    el.innerHTML = `
      <div class="dup-compare" style="margin-top:1rem">
        ${albums.map((a, i) => `
          <div class="dup-side ${i === 0 ? 'selected' : ''}" id="dup-${idx}-${i}" onclick="selectDup(${idx}, ${i}, ${albums.length})">
            <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
              <strong>${esc(a.name)}</strong>
              <span>${a.formats.map(f => `<span class="format-label format-${f.replace('.','')}">${f.replace('.','').toUpperCase()}</span>`).join(' ')}</span>
            </div>
            <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.5rem">
              ${a.track_count} tracks · ${a.total_size_mb} MB ${a.has_cover ? '· Has cover' : ''}
            </div>
            <table>
              <thead><tr><th>#</th><th>Title</th><th>Bitrate</th></tr></thead>
              <tbody>${a.tracks.map(t => `<tr>
                <td class="dim">${t.tracknumber || '?'}</td>
                <td style="font-size:0.8rem">${esc(t.title)}</td>
                <td class="dim mono">${t.bitrate ? t.bitrate+'k' : '-'}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:0.75rem" class="btn-group">
        <button class="btn btn-danger btn-sm" onclick="resolveDup(${idx})">Keep selected, trash others</button>
      </div>`;

    window._dupAlbums = window._dupAlbums || {};
    window._dupAlbums[idx] = { albums, selected: 0 };
  }

  function selectDup(idx, i, total) {
    for (let j = 0; j < total; j++) {
      document.getElementById(`dup-${idx}-${j}`)?.classList.toggle('selected', j === i);
    }
    window._dupAlbums[idx].selected = i;
  }

  async function resolveDup(idx) {
    const data = window._dupAlbums[idx];
    const keep = data.albums[data.selected].path;
    const remove = data.albums.filter((_, i) => i !== data.selected).map(a => a.path);
    if (!confirm(`Keep "${data.albums[data.selected].name}" and trash ${remove.length} other(s)?`)) return;
    const res = await api('/api/duplicates/resolve', 'POST', { keep, remove });
    toast(`Resolved: kept 1, trashed ${res.removed.length}`);
    document.getElementById(`dup-compare-${idx}`).innerHTML = '<div style="color:var(--green);padding:0.5rem">Resolved ✓</div>';
  }

  async function autoResolve(idx) {
    const issue = window._dupIssues[idx];
    const keep = issue.details.keep.replace('/music/', '');
    const remove = issue.details.remove.map(p => p.replace('/music/', ''));
    if (!confirm(`Auto-resolve: keep best version, trash ${remove.length} other(s)?`)) return;
    const res = await api('/api/duplicates/resolve', 'POST', { keep, remove });
    toast(`Resolved: trashed ${res.removed.length}`);
  }

      toast(`Extracted cover for ${a.album}`);

  async function previewOrganize() {
    const artist = document.getElementById('org-artist').value.trim();
    const album = document.getElementById('org-album').value.trim();
    const pattern = document.getElementById('org-pattern').value;
    if (!artist || !album) { toast('Enter artist and album'); return; }

    const data = await api(`/api/organize/preview/${enc(artist)}/${enc(album)}?pattern=${encodeURIComponent(pattern)}`);
    if (data.error) { toast(data.error); return; }

    const el = document.getElementById('org-preview');
    window._orgContext = { artist, album, pattern };

    el.innerHTML = `
      <div style="margin-bottom:1rem">
        <strong>Folder:</strong> <span class="dim">${esc(data.folder_current)}</span>
        ${data.folder_current !== data.folder_suggested ? ` → <span style="color:var(--green)">${esc(data.folder_suggested)}</span>` : ' <span class="dim">(ok)</span>'}
      </div>
      <div style="margin-bottom:1rem;color:var(--text-dim)">${data.changes} of ${data.tracks.length} files would be renamed</div>
      ${data.changes > 0 ? `
        <table>
          <thead><tr><th>Current</th><th>Proposed</th></tr></thead>
          <tbody>${data.tracks.filter(t => t.changed).map(t => `<tr>
            <td><span class="diff-old">${esc(t.current)}</span></td>
            <td><span class="diff-new">${esc(t.proposed)}</span></td>
          </tr>`).join('')}</tbody>
        </table>
        <div class="btn-group" style="margin-top:1rem">
          <button class="btn btn-success" onclick="applyOrganize(false)">Rename Files</button>
          ${data.folder_current !== data.folder_suggested ? `<button class="btn btn-success" onclick="applyOrganize(true)">Rename Files + Folder</button>` : ''}
        </div>` : '<div class="empty">All files already match the pattern</div>'}`;
  }

  async function applyOrganize(renameFolder) {
    const ctx = window._orgContext;
    const body = { pattern: ctx.pattern };
    if (renameFolder) {
      const data = await api(`/api/organize/preview/${enc(ctx.artist)}/${enc(ctx.album)}?pattern=${encodeURIComponent(ctx.pattern)}`);
      body.rename_folder = data.folder_suggested;
    }
    const res = await api(`/api/organize/apply/${enc(ctx.artist)}/${enc(ctx.album)}`, 'POST', body);
    toast(`Renamed ${res.renamed_tracks} files` + (res.folder_renamed ? ` + folder → ${res.folder_renamed}` : '') + (res.errors?.length ? ` (${res.errors.length} errors)` : ''));
  }

      el.innerHTML = '<div class="empty">No pending imports found in download directories</div>';

    const res = await api('/api/imports/import', 'POST', {
      source_path: item.source_path,
      artist: item.artist,
      album: item.album,
    });
    const row = document.getElementById(`import-row-${idx}`);
    if (res.status === 'imported' || res.status === 'merged') {
      row.style.opacity = '0.4';
      toast(`${res.status}: ${item.album} (${res.tracks || res.copied} tracks)`);
    } else {
      toast(res.error || 'Import failed');

    const btn = document.getElementById('btn-import-all');
    btn.innerHTML = '<div class="spinner"></div> Importing...';

    const res = await api('/api/imports/import-all', 'POST', {});

    btn.disabled = false;
    const ok = res.filter(r => r.status === 'imported' || r.status === 'merged').length;
    const fail = res.filter(r => r.error).length;
    toast(`Imported ${ok} albums` + (fail ? `, ${fail} failed` : ''));
    scanImports();
  }

        <div class="stats-row">
          <div class="stat"><div class="val">${data.total_duration_hours}h</div><div class="lbl">Total Playtime</div></div>
          <div class="stat"><div class="val">${data.avg_tracks_per_album}</div><div class="lbl">Avg Tracks/Album</div></div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="section">
          <div class="section-title">By Format</div>
          ${barChart(data.formats, {colorFn: fmtColor})}
        </div>
        <div class="section">
          <div class="section-title">By Bitrate</div>
          ${barChart(data.bitrates)}
        </div>
        <div class="section">
          <div class="section-title">By Decade</div>
          ${barChart(data.decades, {color: 'var(--green)'})}
        </div>
        <div class="section">
          <div class="section-title">Top Genres</div>
          ${barChart(data.genres, {color: 'var(--orange)'})}
        </div>
      </div>

      <div class="section">
        <div class="section-title">Storage by Format</div>
        ${barChart(data.sizes_by_format_gb, {suffix: ' GB', colorFn: fmtColor})}
      </div>

      <div class="section">
        <div class="section-title">Top Artists (by album count)</div>
        <table>
          <thead><tr><th>Artist</th><th>Albums</th></tr></thead>
          <tbody>${data.top_artists.map(a => `<tr>
            <td><a href="#" onclick="event.preventDefault();navigate('/artist/${enc(a.name)}')">${esc(a.name)}</a></td>
            <td class="dim">${a.albums}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
  }

  function barChart(obj, opts = {}) {
    const entries = Object.entries(obj);
    if (!entries.length) return '<div class="empty">No data</div>';
    const max = Math.max(...entries.map(e => e[1]));
    return `<div class="bar-chart">${entries.map(([k, v]) => {
      const pct = max > 0 ? (v / max * 100) : 0;
      const color = opts.colorFn ? opts.colorFn(k) : (opts.color || 'var(--accent)');
      return `<div class="bar-row">
        <div class="bar-label" title="${esc(k)}">${esc(k)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="bar-val">${fmt(v)}${opts.suffix || ''}</div>
      </div>`;
    }).join('')}</div>`;
  }

  function fmtColor(k) {
    k = k.replace('.','').toLowerCase();
    if (k.includes('flac') || k.includes('lossless')) return 'var(--green)';
    if (k.includes('mp3')) return 'var(--blue)';
    if (k.includes('m4a')) return 'var(--orange)';
    return 'var(--accent)';
  }

  // ═══════════════════════════════════════════════════════════════
  // MISSING ALBUMS
  // ═══════════════════════════════════════════════════════════════
  async function renderMissingAlbums(el) {
    el.innerHTML = `
      <div class="section">
        <div class="section-title">Missing Albums</div>
        <p style="color:var(--text-dim);margin-bottom:1rem">Compare your local collection with MusicBrainz discography for an artist.</p>
        <div style="display:flex;gap:0.75rem;align-items:flex-end;margin-bottom:1.5rem">
          <div style="flex:1">
            <input id="missing-artist" style="width:100%;padding:0.5rem 0.75rem;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.9rem" placeholder="Artist folder name (e.g. Radiohead)">
          </div>
          <button class="btn btn-primary" onclick="checkMissing()">Check</button>
        </div>
        <div id="missing-results"></div>
      </div>`;
  }

  async function checkMissing() {
    const artist = document.getElementById('missing-artist').value.trim();
    if (!artist) { toast('Enter an artist name'); return; }

    const el = document.getElementById('missing-results');
    el.innerHTML = '<div class="loading"><div class="spinner"></div> Querying MusicBrainz...</div>';

    const data = await api(`/api/missing/${enc(artist)}`);

    if (data.error) {
      el.innerHTML = `<div class="empty">${esc(data.error)}</div>`;
      return;
    }

    el.innerHTML = `
      <div class="stats-row" style="margin-bottom:1.5rem">
        <div class="stat"><div class="val">${data.local_count}</div><div class="lbl">Local Albums</div></div>
        <div class="stat"><div class="val">${data.mb_count}</div><div class="lbl">MB Discography</div></div>
        <div class="stat"><div class="val" style="color:${data.missing_count > 0 ? 'var(--yellow)' : 'var(--green)'}">${data.missing_count}</div><div class="lbl">Missing</div></div>
      </div>
      ${data.mb_artist_name ? `<div style="color:var(--text-dim);margin-bottom:1rem;font-size:0.85rem">Matched MB artist: <strong>${esc(data.mb_artist_name)}</strong></div>` : ''}
      ${data.missing.length > 0 ? `
        <div class="section-title">Missing from your library</div>
        <table>
          <thead><tr><th>Album</th><th>Year</th><th>Type</th></tr></thead>
          <tbody>${data.missing.map(m => `<tr>
            <td>${esc(m.title)}</td>
            <td class="dim">${m.first_release_date || '?'}</td>
            <td class="dim">${m.type}</td>
          </tr>`).join('')}</tbody>
        </table>` : '<div class="empty" style="color:var(--green)">You have the complete discography!</div>'}

      ${data.local.length > 0 ? `
        <div class="section-title" style="margin-top:2rem">Your local albums</div>
        <table>
          <thead><tr><th>Folder</th><th>Tracks</th><th>MBID</th></tr></thead>
          <tbody>${data.local.map(l => `<tr>
            <td><a href="#" onclick="event.preventDefault();navigate('/album/${enc(artist)}/${enc(l.name)}')">${esc(l.name)}</a></td>
            <td class="dim">${l.track_count}</td>
            <td class="dim mono">${l.mbid ? l.mbid.slice(0,8)+'...' : '-'}</td>
          </tr>`).join('')}</tbody>
        </table>` : ''}`;
  }

  // ═══════════════════════════════════════════════════════════════
  // QUALITY REPORT
  // ═══════════════════════════════════════════════════════════════
  async function renderQuality(el) {
    el.innerHTML = `
      <div class="section">
        <div class="section-title">Quality Report
          <button class="btn btn-primary" id="btn-quality" onclick="runQuality()">Generate Report</button>
        </div>
        <p style="color:var(--text-dim);margin-bottom:1rem">Detect low bitrate files, lossy duplicates of lossless albums, corrupt files, and mixed-format albums.</p>
        <div id="quality-results"></div>
      </div>`;
  }

  async function runQuality() {
    const btn = document.getElementById('btn-quality');
    btn.innerHTML = '<div class="spinner"></div> Scanning...';
    btn.disabled = true;

    const data = await api('/api/quality');
    btn.innerHTML = 'Generate Report';
    btn.disabled = false;

    const el = document.getElementById('quality-results');

    el.innerHTML = `
      <div class="stats-row" style="margin-bottom:1.5rem">
        <div class="stat"><div class="val" style="color:${data.corrupt_count ? 'var(--red)' : 'var(--green)'}">${data.corrupt_count}</div><div class="lbl">Corrupt</div></div>
        <div class="stat"><div class="val" style="color:${data.low_bitrate_count ? 'var(--yellow)' : 'var(--green)'}">${data.low_bitrate_count}</div><div class="lbl">Low Bitrate</div></div>
        <div class="stat"><div class="val" style="color:${data.lossy_with_lossless_count ? 'var(--orange)' : 'var(--green)'}">${data.lossy_with_lossless_count}</div><div class="lbl">Lossy w/ Lossless</div></div>
        <div class="stat"><div class="val">${data.mixed_format_count}</div><div class="lbl">Mixed Format</div></div>
      </div>

      ${data.corrupt.length ? `
        <div class="section">
          <div class="section-title" style="color:var(--red)">Corrupt / Unreadable Files (${data.corrupt.length})</div>
          <table>
            <thead><tr><th>Artist</th><th>Album</th><th>File</th><th>Reason</th></tr></thead>
            <tbody>${data.corrupt.map(c => `<tr>
              <td>${esc(c.artist)}</td>
              <td>${esc(c.album)}</td>
              <td style="font-size:0.8rem">${esc(c.file)}</td>
              <td class="dim" style="font-size:0.8rem">${esc(c.reason)}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>` : ''}

      ${data.low_bitrate.length ? `
        <div class="section">
          <div class="section-title" style="color:var(--yellow)">Low Bitrate Files (${data.low_bitrate.length})</div>
          <table>
            <thead><tr><th>Artist</th><th>Album</th><th>File</th><th>Bitrate</th></tr></thead>
            <tbody>${data.low_bitrate.slice(0, 100).map(l => `<tr>
              <td>${esc(l.artist)}</td>
              <td>${esc(l.album)}</td>
              <td style="font-size:0.8rem">${esc(l.file)}</td>
              <td class="dim mono">${l.bitrate_kbps}k</td>
            </tr>`).join('')}</tbody>
          </table>
          ${data.low_bitrate.length > 100 ? `<div class="dim" style="padding:0.5rem">...and ${data.low_bitrate.length - 100} more</div>` : ''}
        </div>` : ''}

      ${data.lossy_with_lossless.length ? `
        <div class="section">
          <div class="section-title" style="color:var(--orange)">Lossy Albums with Lossless Available (${data.lossy_with_lossless.length})</div>
          <table>
            <thead><tr><th>Artist</th><th>Lossy Album</th><th>Format</th><th>Lossless Version</th></tr></thead>
            <tbody>${data.lossy_with_lossless.map(l => `<tr>
              <td>${esc(l.artist)}</td>
              <td>${esc(l.lossy_album)}</td>
              <td class="dim">${l.lossy_formats.join(', ')}</td>
              <td style="color:var(--green)">${esc(l.lossless_album)}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>` : ''}

      ${data.mixed_format_albums.length ? `
        <div class="section">
          <div class="section-title">Mixed Format Albums (${data.mixed_format_albums.length})</div>
          <table>
            <thead><tr><th>Artist</th><th>Album</th><th>Formats</th><th>Tracks</th></tr></thead>
            <tbody>${data.mixed_format_albums.map(m => `<tr>
              <td>${esc(m.artist)}</td>
              <td>${esc(m.album)}</td>
              <td>${m.formats.map(f => `<span class="format-label format-${f.replace('.','')}">${f.replace('.','').toUpperCase()}</span>`).join(' ')}</td>
              <td class="dim">${m.track_count}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>` : ''}

      ${!data.corrupt.length && !data.low_bitrate.length && !data.lossy_with_lossless.length && !data.mixed_format_albums.length ?
        '<div class="empty" style="color:var(--green)">Library quality is excellent!</div>' : ''}`;
  }

  // ═══════════════════════════════════════════════════════════════
  // SEARCH
  // ═══════════════════════════════════════════════════════════════
  let searchTimeout;
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    if (q.length < 2) { searchResults.classList.remove('show'); return; }
    searchTimeout = setTimeout(async () => {
      const data = await api(`/api/search?q=${encodeURIComponent(q)}`);
      let html = '';
      data.artists?.slice(0, 8).forEach(a => {
        html += `<div class="search-result" onclick="navigate('/artist/${enc(a.name)}');searchResults.classList.remove('show');searchInput.value=''"><strong>${esc(a.name)}</strong><div class="dim">Artist</div></div>`;
      });
      data.albums?.slice(0, 15).forEach(a => {
        html += `<div class="search-result" onclick="navigate('/album/${enc(a.artist)}/${enc(a.name)}');searchResults.classList.remove('show');searchInput.value=''"><strong>${esc(a.name)}</strong><div class="dim">${esc(a.artist)}</div></div>`;
      });
      searchResults.innerHTML = html || '<div class="search-result dim">No results</div>';
      searchResults.classList.add('show');
    }, 300);
  });

  searchInput.addEventListener('blur', () => setTimeout(() => searchResults.classList.remove('show'), 200));
  searchInput.addEventListener('focus', () => { if (searchInput.value.trim().length >= 2) searchResults.classList.add('show'); });

  // ═══════════════════════════════════════════════════════════════
  // UTILS
  // ═══════════════════════════════════════════════════════════════
  async function api(url, method = 'GET', body = null) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const res = await fetch(url, opts);
    return res.json();
  }

  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function enc(s) { return encodeURIComponent(s); }
  function fmt(n) { return (n || 0).toLocaleString(); }
  function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3000);
  }

  // Initial render
  navigate(location.pathname, false);
  </script>
</body>
</html>
