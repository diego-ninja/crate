networks:
  crate:
    external: true

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - 'no-new-privileges:true'
    networks:
      - crate
    environment:
      - TZ=${TZ}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_DIR}/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${DATA_DIR}/traefik/acme.json:/acme.json
      - ${DATA_DIR}/traefik/conf:/conf
      - ${DATA_DIR}/traefik/logs:/var/log/traefik
    labels:
      traefik.enable: true
      traefik.http.services.traefik.loadbalancer.server.port: 80
      traefik.http.routers.traefik-secure.rule: Host(`traefik.${DOMAIN}`)
      traefik.http.routers.traefik-secure.entryPoints: websecure
      traefik.http.routers.traefik-secure.service: api@internal
      # traefik.http.routers.traefik-secure.middlewares: authelia@docker  # Enable after creating users
    depends_on:
      - authelia

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    environment:
      - TZ=${TZ}
      - X_AUTHELIA_CONFIG_FILTERS=template
    volumes:
      - '${DATA_DIR}/authelia/secrets:/secrets:ro'
      - '${DATA_DIR}/authelia/config:/config'
      - '${DATA_DIR}/authelia/logs:/var/log/authelia/'
    networks:
      - crate
    ports:
      - "${AUTHELIA_PORT}:9091"
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.authelia.rule: Host(`auth.${DOMAIN}`)
      traefik.http.routers.authelia.entryPoints: websecure
      # Forward-auth middleware for protected services
      traefik.http.middlewares.authelia.forwardAuth.address: http://authelia:9091/api/authz/forward-auth
      traefik.http.middlewares.authelia.forwardAuth.trustForwardHeader: true
      traefik.http.middlewares.authelia.forwardAuth.authResponseHeaders: Remote-User,Remote-Groups,Remote-Email,Remote-Name

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}/lidarr:/config
      - ${MEDIA_DIR}:/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:lidarr
      - TP_THEME=nord
    ports:
      - "${LIDARR_PORT}:8686"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.lidarr.rule: Host(`collection.${DOMAIN}`)
      traefik.http.routers.lidarr.entryPoints: websecure
      traefik.http.services.lidarr.loadbalancer.server.port: 8686

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: always
    volumes:
      - ${DATA_DIR}/navidrome:/data
      - ${MEDIA_DIR}/music:/music:ro
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=0002
      - TZ=${TZ}
      - ND_LOGLEVEL=${NAVIDROME_LOG_LEVEL}
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=/
      - ND_ENABLEGRAVATAR=true
      - ND_ENABLESHARING=true
      - ND_SCANSCHEDULE=@every 1h
      - ND_AUTOIMPORTPLAYLISTS=true
      - ND_ENABLETRANSCODINGCONFIG=true
      - ND_TRANSCODINGCACHESIZE=150MB
      - ND_FFMPEGPATH=/usr/bin/ffmpeg
      - ND_IMAGECACHESIZE=300MB
      - ND_MAXMPDCLIENTS=10
      - ND_CACHESIZE=200MB
      - ND_MAXSIDELOADEDASSETS=500
      - ND_DEFAULTTHEME=DARK
      - ND_DEFAULTLANGUAGE=${LANGUAGE}
      - ND_ENABLEDOWNLOADS=true
      - ND_GATRACKINGID=
      - ND_PASSWORDREQUIREMENT=8^(?=.*[a-z])(?=.*[A-Z])
      - ND_REVERSEPROXYWHITELIST=0.0.0.0/0
      - ND_ENABLEUSEREDITING=false
      - ND_LASTFM_ENABLED=true
      - ND_LASTFM_APIKEY=${LASTFM_APIKEY}
      - ND_LASTFM_SECRET=${LASTFM_SECRET}
      - ND_LASTFM_LANGUAGE=${LANGUAGE}
      - ND_SPOTIFY_ID=${SPOTIFY_ID}
      - ND_SPOTIFY_SECRET=${SPOTIFY_SECRET}
    ports:
      - "${NAVIDROME_PORT}:4533"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.services.navidrome.loadbalancer.server.port: 4533
      traefik.http.routers.navidrome.entryPoints: websecure
      traefik.http.routers.navidrome.rule: Host(`play.${DOMAIN}`)
      traefik.http.routers.navidrome.tls: true
      traefik.http.routers.navidrome.tls.certresolver: letsencrypt
      traefik.http.routers.navidrome.middlewares: crate-auth-soft@docker
      traefik.http.routers.navidrome-subsonic.rule: Host(`api.${DOMAIN}`) && PathPrefix(`/rest/`) && !Query(`c`, `NavidromeUI`)
      traefik.http.routers.navidrome-subsonic.entryPoints: websecure

  tidarr:
    image: cstaelen/tidarr:latest
    container_name: tidarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # Auth disabled — MusicDock handles access via Traefik middleware
      - ENABLE_BEETS=true
      - REACT_APP_TIDAL_COUNTRY_CODE=${TIDAL_COUNTRY_CODE}
    volumes:
      - ${DATA_DIR}/tidarr:/home/app/standalone/shared
      - ${MEDIA_DIR}/downloads/tidal/incomplete:/home/app/standalone/download/incomplete
      - ${MEDIA_DIR}/downloads/tidal/albums:/home/app/standalone/download/albums
      - ${MEDIA_DIR}/downloads/tidal/tracks:/home/app/standalone/download/tracks
      - ${MEDIA_DIR}/downloads/tidal/playlists:/home/app/standalone/download/playlists
      - ${MEDIA_DIR}/music:/home/app/standalone/library
      - ${MEDIA_DIR}/music:/music
      - ${MEDIA_DIR}/downloads/tidal/videos:/home/app/standalone/download/videos
    ports:
      - "${TIDARR_PORT}:8484"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.tidarr.rule: Host(`search.${DOMAIN}`)
      traefik.http.routers.tidarr.entryPoints: websecure
      traefik.http.routers.tidarr.tls: true
      traefik.http.routers.tidarr.tls.certresolver: letsencrypt
      traefik.http.routers.tidarr.middlewares: crate-auth-soft@docker
      traefik.http.services.tidarr.loadbalancer.server.port: 8484
      traefik.http.services.tidarr.loadbalancer.server.scheme: http

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR}/nginx/html:/usr/share/nginx/html:ro
      - ${DATA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR}/nginx/logs:/var/log/nginx
    ports:
      - "${NGINX_PORT}:80"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.diego-ninja.rule: Host(`diego.ninja`)
      traefik.http.routers.diego-ninja.entryPoints: websecure
      traefik.http.services.diego-ninja.loadbalancer.server.port: 80
      traefik.http.routers.diego-ninja.middlewares: diego-ninja-headers
      traefik.http.middlewares.diego-ninja-headers.headers.customRequestHeaders.X-Forwarded-Proto: https
      traefik.http.middlewares.diego-ninja-headers.headers.customResponseHeaders.X-Frame-Options: SAMEORIGIN
      traefik.http.middlewares.diego-ninja-headers.headers.customResponseHeaders.X-Content-Type-Options: nosniff
      traefik.http.middlewares.diego-ninja-headers.headers.customResponseHeaders.Referrer-Policy: strict-origin-when-cross-origin
      traefik.http.routers.diego-ninja.tls: true
      traefik.http.routers.diego-ninja.tls.certresolver: letsencrypt

  # Soulseek client via slskd
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SHARED_DIR=/data/music
      - SLSKD_DOWNLOADS_DIR=/data/downloads/soulseek
      - SLSKD_INCOMPLETE_DIR=/data/downloads/soulseek/incomplete
      - SLSKD_WEB_AUTHENTICATION_API_KEYS_SOULSYNC=${SLSKD_API_KEY}
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_SOULSEEK_LISTEN_IP=0.0.0.0
      - SLSKD_SOULSEEK_LISTEN_PORT=${SLSKD_LISTEN_PORT}
    volumes:
      - ${DATA_DIR}/slskd:/app
      - ${MEDIA_DIR}:/data
    ports:
      - "${SLSKD_PORT}:5030"
      - "${SLSKD_LISTEN_PORT}:${SLSKD_LISTEN_PORT}"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.slskd.rule: Host(`soulseek.${DOMAIN}`)
      traefik.http.routers.slskd.entryPoints: websecure
      traefik.http.services.slskd.loadbalancer.server.port: 5030
      traefik.http.routers.slskd.tls: true
      traefik.http.routers.slskd.tls.certresolver: letsencrypt

  # MusicDock — Redis cache
  crate-redis:
    image: redis:7-alpine
    container_name: crate-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - crate_redis:/data
    networks:
      - crate

  # MusicDock — PostgreSQL database
  # POSTGRES_USER/PASSWORD/DB only take effect on first volume init.
  # The app connects using CRATE_POSTGRES_* vars from .env.
  # These MUST match an existing role in the volume, or the init script
  # must create one. See app/scripts/init-postgres.sh for provisioning.
  crate-postgres:
    image: postgres:15-alpine
    container_name: crate-postgres
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER_USER:-musicdock}"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - POSTGRES_USER=${POSTGRES_SUPERUSER_USER:-musicdock}
      - POSTGRES_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-musicdock}
      - POSTGRES_DB=${POSTGRES_SUPERUSER_DB:-musicdock}
    volumes:
      - crate_postgres:/var/lib/postgresql/data
    networks:
      - crate

  # MusicDock — Music stack management
  crate-api:
    image: ghcr.io/diego-ninja/crate-backend:${CRATE_IMAGE_TAG:-latest}
    build: ./app
    container_name: crate-api
    restart: unless-stopped
    user: ${PUID}:${PGID}
    group_add:
      - "${DOCKER_GID:-988}"
    environment:
      - TZ=${TZ}
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - LASTFM_APIKEY=${LASTFM_APIKEY}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=admin
      - NAVIDROME_PASSWORD=${NAVIDROME_PASSWORD}
      - DOMAIN=${DOMAIN}
      - SPOTIFY_ID=${SPOTIFY_ID}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY}
      - AUDIOMUSE_URL=http://audiomuse:8000
      - AUDIOMUSE_POSTGRES_HOST=audiomuse-postgres
      - AUDIOMUSE_POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER}
      - AUDIOMUSE_POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - AUDIOMUSE_POSTGRES_DB=${AUDIOMUSE_POSTGRES_DB}
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
      - POSTGRES_SUPERUSER_USER=${POSTGRES_SUPERUSER_USER:-musicdock}
      - POSTGRES_SUPERUSER_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-musicdock}
      - POSTGRES_SUPERUSER_DB=${POSTGRES_SUPERUSER_DB:-musicdock}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - REDIS_URL=redis://crate-redis:6379/0
      - SLSKD_URL=http://slskd:5030
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - DISCOGS_CONSUMER_KEY=${DISCOGS_CONSUMER_KEY:-}
      - DISCOGS_CONSUMER_SECRET=${DISCOGS_CONSUMER_SECRET:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ${MEDIA_DIR}/music:/music:ro
      - ${DATA_DIR}/librarian:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - crate
    depends_on:
      - crate-postgres
      - crate-redis
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.crate-api.rule: Host(`api.${DOMAIN}`)
      traefik.http.routers.crate-api.entryPoints: websecure
      traefik.http.services.crate-api.loadbalancer.server.port: 8585
      traefik.http.routers.crate-api.tls: true
      traefik.http.routers.crate-api.tls.certresolver: letsencrypt
    command: ["api"]

  crate-worker:
    image: ghcr.io/diego-ninja/crate-backend:${CRATE_IMAGE_TAG:-latest}
    build: ./app
    container_name: crate-worker
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - LASTFM_APIKEY=${LASTFM_APIKEY}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=admin
      - NAVIDROME_PASSWORD=${NAVIDROME_PASSWORD}
      - DOMAIN=${DOMAIN}
      - SPOTIFY_ID=${SPOTIFY_ID}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY}
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
      - POSTGRES_SUPERUSER_USER=${POSTGRES_SUPERUSER_USER:-musicdock}
      - POSTGRES_SUPERUSER_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-musicdock}
      - POSTGRES_SUPERUSER_DB=${POSTGRES_SUPERUSER_DB:-musicdock}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - REDIS_URL=redis://crate-redis:6379/0
      - SLSKD_URL=http://slskd:5030
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - DISCOGS_CONSUMER_KEY=${DISCOGS_CONSUMER_KEY:-}
      - DISCOGS_CONSUMER_SECRET=${DISCOGS_CONSUMER_SECRET:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ${MEDIA_DIR}/music:/music
      - ${MEDIA_DIR}/downloads/soulseek:/downloads/soulseek
      - ${DATA_DIR}/librarian:/data
    networks:
      - crate
    depends_on:
      - crate-postgres
      - crate-redis
    mem_limit: 4g
    command: ["worker"]

  crate-ui:
    image: ghcr.io/diego-ninja/crate-ui:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app
      dockerfile: ui/Dockerfile
    container_name: crate-ui
    restart: unless-stopped
    depends_on:
      - crate-api
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.admin.rule: Host(`admin.${DOMAIN}`)
      traefik.http.routers.admin.entryPoints: websecure
      traefik.http.services.admin.loadbalancer.server.port: 80
      traefik.http.routers.admin.tls: true
      traefik.http.routers.admin.tls.certresolver: letsencrypt

  crate-listen:
    image: ghcr.io/diego-ninja/crate-listen:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app
      dockerfile: listen/Dockerfile
    container_name: crate-listen
    restart: unless-stopped
    depends_on:
      - crate-api
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.listen.rule: Host(`listen.${DOMAIN}`)
      traefik.http.routers.listen.entryPoints: websecure
      traefik.http.services.listen.loadbalancer.server.port: 80
      traefik.http.routers.listen.tls: true
      traefik.http.routers.listen.tls.certresolver: letsencrypt
      # Forward-auth middlewares (used by other services)
      traefik.http.middlewares.crate-auth.forwardAuth.address: http://crate-api:8585/api/auth/verify
      traefik.http.middlewares.crate-auth.forwardAuth.trustForwardHeader: true
      traefik.http.middlewares.crate-auth.forwardAuth.authResponseHeaders: Remote-User,Remote-Name,Remote-Role
      traefik.http.middlewares.crate-auth-soft.forwardAuth.address: http://crate-api:8585/api/auth/verify-soft
      traefik.http.middlewares.crate-auth-soft.forwardAuth.trustForwardHeader: true
      traefik.http.middlewares.crate-auth-soft.forwardAuth.authResponseHeaders: Remote-User,Remote-Name,Remote-Role
      # traefik.http.routers.admin.middlewares: authelia@docker  # Enable after creating users

  # AudioMuse-AI — Sonic analysis and intelligent playlists
  # Disabled by default (heavy: ~2GB RAM). Enable with: docker compose --profile audiomuse up -d
  audiomuse-redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    restart: unless-stopped
    profiles: ["audiomuse"]
    volumes:
      - audiomuse_redis:/data
    networks:
      - crate

  audiomuse-postgres:
    image: postgres:15-alpine
    container_name: audiomuse-postgres
    restart: unless-stopped
    profiles: ["audiomuse"]
    environment:
      - POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUDIOMUSE_POSTGRES_DB}
    volumes:
      - audiomuse_postgres:/var/lib/postgresql/data
    networks:
      - crate

  audiomuse:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse
    restart: unless-stopped
    profiles: ["audiomuse"]
    environment:
      - SERVICE_TYPE=flask
      - TZ=${TZ}
      - MEDIASERVER_TYPE=navidrome
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=${AUDIOMUSE_NAVIDROME_USER}
      - NAVIDROME_PASSWORD=${AUDIOMUSE_NAVIDROME_PASSWORD}
      - POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUDIOMUSE_POSTGRES_DB}
      - POSTGRES_HOST=audiomuse-postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://audiomuse-redis:6379/0
      - GEMINI_API_KEY=${AUDIOMUSE_GEMINI_API_KEY}
      - CLAP_ENABLED=false
      - TEMP_DIR=/app/temp_audio
    volumes:
      - audiomuse_temp_flask:/app/temp_audio
    ports:
      - "${AUDIOMUSE_PORT}:8000"
    depends_on:
      - audiomuse-redis
      - audiomuse-postgres
      - navidrome
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.audiomuse.rule: Host(`ai.${DOMAIN}`)
      traefik.http.routers.audiomuse.entryPoints: websecure
      traefik.http.services.audiomuse.loadbalancer.server.port: 8000
      traefik.http.routers.audiomuse.tls: true
      traefik.http.routers.audiomuse.tls.certresolver: letsencrypt

  audiomuse-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse-worker
    restart: unless-stopped
    profiles: ["audiomuse"]
    mem_limit: 2g
    environment:
      - SERVICE_TYPE=worker
      - TZ=${TZ}
      - MEDIASERVER_TYPE=navidrome
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=${AUDIOMUSE_NAVIDROME_USER}
      - NAVIDROME_PASSWORD=${AUDIOMUSE_NAVIDROME_PASSWORD}
      - POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUDIOMUSE_POSTGRES_DB}
      - POSTGRES_HOST=audiomuse-postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://audiomuse-redis:6379/0
      - GEMINI_API_KEY=${AUDIOMUSE_GEMINI_API_KEY}
      - CLAP_ENABLED=false
      - TEMP_DIR=/app/temp_audio
    volumes:
      - audiomuse_temp_worker:/app/temp_audio
    depends_on:
      - audiomuse-redis
      - audiomuse-postgres
    networks:
      - crate

volumes:
  crate_redis:
    driver: local
  crate_postgres:
    driver: local
  audiomuse_redis:
    driver: local
  audiomuse_postgres:
    driver: local
  audiomuse_temp_flask:
    driver: local
  audiomuse_temp_worker:
    driver: local
